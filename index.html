<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTC 2026 会议日程 - March 15</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        
        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 20px 0 40px;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .filters-section {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }
        
        .filter-groups {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .filter-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        
        .time-filters .filter-btn.active {
            background: #f093fb;
            border-color: #f093fb;
        }
        
        .format-filters .filter-btn.in-person.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        
        .format-filters .filter-btn.virtual.active {
            background: #2196F3;
            border-color: #2196F3;
        }
        
        .level-filters .filter-btn.beginner.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        
        .level-filters .filter-btn.intermediate.active {
            background: #FF9800;
            border-color: #FF9800;
        }
        
        .level-filters .filter-btn.advanced.active {
            background: #f44336;
            border-color: #f44336;
        }
        
        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }
        
        .session-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .session-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            border-color: #667eea;
        }
        
        .session-card.hidden {
            display: none;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .session-time {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .session-badges {
            display: flex;
            gap: 6px;
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-format-in-person {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .badge-format-virtual {
            background: #e3f2fd;
            color: #1565c0;
        }
        
        .badge-level-beginner {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .badge-level-intermediate {
            background: #fff3e0;
            color: #e65100;
        }
        
        .badge-level-advanced {
            background: #ffebee;
            color: #c62828;
        }
        
        .session-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .session-id {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 12px;
            font-family: monospace;
        }
        
        .session-topic {
            display: inline-block;
            background: #f0f0f0;
            color: #555;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }
        
        .session-speakers {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .session-speakers strong {
            color: #333;
        }
        
        .session-description {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: white;
            display: none;
        }
        
        .no-results.show {
            display: block;
        }
        
        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        footer {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.7);
        }
        
        footer a {
            color: white;
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .sessions-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-group {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 GTC 2026 会议日程</h1>
            <p>NVIDIA GPU Technology Conference - March 15, 2026</p>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-number" id="total-count">18</div>
                    <div class="stat-label">总会议数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">9</div>
                    <div class="stat-label">线下会议</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">9</div>
                    <div class="stat-label">线上会议</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">4</div>
                    <div class="stat-label">时间段</div>
                </div>
            </div>
        </header>
        
        <div class="filters-section">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索会议标题、演讲者、主题...">
            </div>
            
            <div class="filter-groups">
                <div class="filter-group time-filters">
                    <label>⏰ 时间段</label>
                    <div class="filter-buttons">
                        <button class="filter-btn" data-filter="time" data-value="8:30 AM">8:30 AM</button>
                        <button class="filter-btn" data-filter="time" data-value="7:00 PM">7:00 PM</button>
                        <button class="filter-btn" data-filter="time" data-value="8:00 PM">8:00 PM</button>
                        <button class="filter-btn" data-filter="time" data-value="11:00 PM">11:00 PM</button>
                    </div>
                </div>
                
                <div class="filter-group format-filters">
                    <label>📍 会议形式</label>
                    <div class="filter-buttons">
                        <button class="filter-btn in-person" data-filter="format" data-value="In-Person">线下 In-Person</button>
                        <button class="filter-btn virtual" data-filter="format" data-value="Virtual">线上 Virtual</button>
                    </div>
                </div>
                
                <div class="filter-group level-filters">
                    <label>📊 难度级别</label>
                    <div class="filter-buttons">
                        <button class="filter-btn beginner" data-filter="level" data-value="Beginner">初级</button>
                        <button class="filter-btn intermediate" data-filter="level" data-value="Intermediate">中级</button>
                        <button class="filter-btn advanced" data-filter="level" data-value="Advanced">高级</button>
                    </div>
                </div>
                
                <div class="filter-group topic-filters">
                    <label>🏷️ 主题分类</label>
                    <div class="filter-buttons">
                        <button class="filter-btn" data-filter="topic" data-value="AI Agents">AI Agents</button>
                        <button class="filter-btn" data-filter="topic" data-value="LLM">LLM</button>
                        <button class="filter-btn" data-filter="topic" data-value="Robotics">机器人</button>
                        <button class="filter-btn" data-filter="topic" data-value="Computer Vision">计算机视觉</button>
                        <button class="filter-btn" data-filter="topic" data-value="Data Science">数据科学</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="sessions-grid" id="sessions-container">
            <!-- Sessions will be inserted here -->
        </div>
        
        <div class="no-results" id="no-results">
            <div class="no-results-icon">🔍</div>
            <h3>没有找到匹配的会议</h3>
            <p>请尝试调整筛选条件或搜索关键词</p>
        </div>
        
        <footer>
            <p>数据来源: NVIDIA GTC 2026 | 制作 with ❤️</p>
        </footer>
    </div>

            {

                time: "8:30 AM",

                format: "In-Person",

            },
            {
                id: "gtc26-dliw82274",
                title: "Deploying and Optimizing AI Inference at Scale",
                time: "8:30 AM",
                fullTime: "March 15, 2026 - 8:30 AM PDT",
                speakers: "Anshul Jindal, Mohak Chadha, Severine Habert",
                language: "English",

            {
                id: "gtc26-s82354",

                time: "8:00 PM",

                speakers: "Alvin Ee, Michael Balaban, Bojan Petrovic, Janaki Vamaraju, Rishabh Kaushal",

            },
            {

            {

                title: "Deploy AI Agents on a Kubernetes Cluster",

            {

                language: "English",
                format: "Virtual",

                description: "Learn to develop multimodal AI agents for content creation workflows. Covers text, image, and video understanding."
            },
            {
                id: "gtc26-s81961",
                title: "Accelerating Video Analytics With NVIDIA AI Blueprints",
                time: "11:00 PM",
                fullTime: "March 15, 2026 - 11:00 PM PDT",
                speakers: "Asier Arranz, Carlos Alvarez, Michael Sherman",
                language: "English",
                format: "Virtual",
                level: "Intermediate",
                topic: "Computer Vision",
                description: "Learn how to accelerate video analytics using NVIDIA AI Blueprints. Covers real-time video processing and object detection."
            },
            {
                id: "gtc26-s82127",
                title: "Building a Brain for Your Robot: How to Create Autonomous Machines With AI",
                time: "11:00 PM",
                fullTime: "March 15, 2026 - 11:00 PM PDT",
                speakers: "Katie (Wenyan) Lin",
                language: "English",
                format: "Virtual",
                level: "Intermediate",
                topic: "Robotics",
                description: "Learn how to build AI-powered autonomous robots using NVIDIA Isaac and related technologies."
            }
        ];
        
        let activeFilters = {
            time: [],
            format: [],
            level: [],
            topic: []
        };
        
        let searchQuery = '';
        
        function renderSessions() {
            const container = document.getElementById('sessions-container');
            const noResults = document.getElementById('no-results');
            
            const filteredSessions = sessions.filter(session => {
                // Search filter
                if (searchQuery) {
                    const searchLower = searchQuery.toLowerCase();
                    const matchSearch = session.title.toLowerCase().includes(searchLower) ||
                                      session.speakers.toLowerCase().includes(searchLower) ||
                                      session.topic.toLowerCase().includes(searchLower) ||
                                      session.description.toLowerCase().includes(searchLower);
                    if (!matchSearch) return false;
                }
                
                // Time filter
                if (activeFilters.time.length > 0 && !activeFilters.time.includes(session.time)) {
                    return false;
                }
                
                // Format filter
                if (activeFilters.format.length > 0 && !activeFilters.format.includes(session.format)) {
                    return false;
                }
                
                // Level filter
                if (activeFilters.level.length > 0 && !activeFilters.level.includes(session.level)) {
                    return false;
                }
                
                // Topic filter
                if (activeFilters.topic.length > 0) {
                    const matchTopic = activeFilters.topic.some(topic => 
                        session.topic.toLowerCase().includes(topic.toLowerCase())
                    );
                    if (!matchTopic) return false;
                }
                
                return true;
            });
            
            if (filteredSessions.length === 0) {
                container.innerHTML = '';
                noResults.classList.add('show');
                document.getElementById('total-count').textContent = '0';
            } else {
                noResults.classList.remove('show');
                document.getElementById('total-count').textContent = filteredSessions.length;
                
                container.innerHTML = filteredSessions.map(session => `
                    <div class="session-card" data-time="${session.time}" data-format="${session.format}" data-level="${session.level}" data-topic="${session.topic}">
                        <div class="card-header">
                            <span class="session-time">${session.time} PDT</span>
                            <div class="session-badges">
                                <span class="badge badge-format-${session.format.toLowerCase().replace(' ', '-')}">${session.format}</span>
                                <span class="badge badge-level-${session.level.toLowerCase()}">${session.level}</span>
                            </div>
                        </div>
                        <div class="session-id">${session.id}</div>
                        <h3 class="session-title">${session.title}</h3>
                        <span class="session-topic">${session.topic}</span>
                        <div class="session-speakers">
                            <strong>👤 演讲者:</strong> ${session.speakers}
                        </div>
                        <div class="session-description">${session.description}</div>
                    </div>
                `).join('');
            }
        }
        
        // Search input handler
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderSessions();
        });
        
        // Filter button handlers
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const filterType = btn.dataset.filter;
                const filterValue = btn.dataset.value;
                
                btn.classList.toggle('active');
                
                if (btn.classList.contains('active')) {
                    if (!activeFilters[filterType].includes(filterValue)) {
                        activeFilters[filterType].push(filterValue);
                    }
                } else {
                    activeFilters[filterType] = activeFilters[filterType].filter(v => v !== filterValue);
                }
                
                renderSessions();
            });
        });
        
        // Initial render
        renderSessions();
    </script>
</body>
</html>
