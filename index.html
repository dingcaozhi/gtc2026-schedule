            width: 100%;

            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s;

            border-color: #667eea;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 50%;

            font-size: 1.2rem;
        }

            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .filter-buttons {

            flex-wrap: wrap;
            gap: 8px;
        }

        }

            gap: 25px;
        }

        .session-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;

                    activeFilters[filterType] = activeFilters[filterType].filter(v => v !== filterValue);
                }

                renderSessions();
            });
        });

        // Initial render
        renderSessions();
    </script>
</body>
</html>
