        let activeFilters = {
            time: [],
            format: [],
            level: [],
            language: [],
            topic: []
        };
        
        let searchQuery = '';
        
        function renderSessions() {
            const container = document.getElementById('sessions-container');
            const noResults = document.getElementById('no-results');
            
            const filteredSessions = sessions.filter(session => {
                // Search filter
                if (searchQuery) {
                    const searchLower = searchQuery.toLowerCase();
                    const matchSearch = session.title.toLowerCase().includes(searchLower) ||
                                      session.speakers.toLowerCase().includes(searchLower) ||
                                      session.topic.toLowerCase().includes(searchLower) ||
                                      session.description.toLowerCase().includes(searchLower);
                    if (!matchSearch) return false;
                }
                
                // Time filter
                if (activeFilters.time.length > 0 && !activeFilters.time.includes(session.time)) {
                    return false;
                }
                
                // Format filter
                if (activeFilters.format.length > 0 && !activeFilters.format.includes(session.format)) {
                    return false;
                }
                
                // Level filter
                if (activeFilters.level.length > 0 && !activeFilters.level.includes(session.level)) {
                    return false;
                }
                
                // Language filter
                if (activeFilters.language.length > 0 && !activeFilters.language.includes(session.language)) {
                    return false;
                }
                
                // Topic filter
                if (activeFilters.topic.length > 0) {
                    const matchTopic = activeFilters.topic.some(topic => 
                        session.topic.toLowerCase().includes(topic.toLowerCase())
                    );
                    if (!matchTopic) return false;
                }
                
                return true;
            });
            
            if (filteredSessions.length === 0) {
                container.innerHTML = '';
                noResults.classList.add('show');
                document.getElementById('total-count').textContent = '0';
            } else {
                noResults.classList.remove('show');
                document.getElementById('total-count').textContent = filteredSessions.length;
                
                container.innerHTML = filteredSessions.map(session => `
                    <a href="session/${session.id}.html" class="session-card-link" style="text-decoration: none; color: inherit;">
                        <div class="session-card" data-time="${session.time}" data-format="${session.format}" data-level="${session.level}" data-topic="${session.topic}">
                            <div class="card-header">
                                <span class="session-time">${session.time} PDT</span>
                                <div class="session-badges">
                                    <span class="badge badge-format-${session.format.toLowerCase().replace(' ', '-')}">${session.format}</span>
                                    <span class="badge badge-level-${session.level.toLowerCase()}">${session.level}</span>
                                    ${session.language === '中文' ? '<span class="badge" style="background: #fce4ec; color: #c2185b;">中文</span>' : ''}
                                </div>
                            </div>
                            <div class="session-id">${session.id}</div>
                            <h3 class="session-title">${session.title}</h3>
                            <span class="session-topic">${session.topic}</span>
                            <div class="session-speakers">
                                <strong>👤 演讲者:</strong> ${session.speakers}
                            </div>
                            <div class="session-language" style="color: #888; font-size: 0.85rem; margin-bottom: 8px;">
                                🌐 ${session.language}
                            </div>
                            <div class="session-description">${session.description}</div>
                            <div class="view-analysis" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; color: #667eea; font-weight: 600; font-size: 0.9rem;">
                                🔍 查看视频分析 →
                            </div>
                        </div>
                    </a>
                `).join('');
            }
        }
        
        // Search input handler
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderSessions();
        });
        
        // Filter button handlers
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const filterType = btn.dataset.filter;
                const filterValue = btn.dataset.value;
                
                btn.classList.toggle('active');
                
                if (btn.classList.contains('active')) {
                    if (!activeFilters[filterType].includes(filterValue)) {
                        activeFilters[filterType].push(filterValue);
                    }
                } else {
                    activeFilters[filterType] = activeFilters[filterType].filter(v => v !== filterValue);
                }
                
                renderSessions();
            });
        });
        
        // Initial render
        renderSessions();
    </script>
